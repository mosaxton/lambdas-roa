services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: roa
      POSTGRES_PASSWORD: roa
      POSTGRES_DB: roa_lambdas_dev
    ports:
      - "5433:5432"
    volumes:
      - roa_lambdas_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roa -d roa_lambdas_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  roa_lambdas_pg:
