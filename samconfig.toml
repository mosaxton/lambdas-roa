version = 0.1

# ── Default (used when --config-env is not specified) ────────────────────────
[default.global.parameters]
stack_name = "roa-lambdas-dev"
s3_bucket = "FILL_IN_SAM_ARTIFACT_BUCKET"
s3_prefix = "roa-lambdas"
region = "us-east-1"
capabilities = "CAPABILITY_IAM CAPABILITY_AUTO_EXPAND CAPABILITY_NAMED_IAM"
confirm_changeset = true
template_file = "infra/template.yaml"

[default.build.parameters]
use_container = false
cached = true
parallel = true

# ── dev ──────────────────────────────────────────────────────────────────────
[dev.global.parameters]
stack_name = "roa-lambdas-dev"
s3_bucket = "FILL_IN_SAM_ARTIFACT_BUCKET_DEV"
s3_prefix = "roa-lambdas/dev"
region = "us-east-1"
capabilities = "CAPABILITY_IAM CAPABILITY_AUTO_EXPAND CAPABILITY_NAMED_IAM"
confirm_changeset = false
template_file = "infra/template.yaml"

[dev.deploy.parameters]
parameter_overrides = [
  "Environment=dev",
  "DatabaseUrlSecretName=roa/database-url",
  "EncryptionKeySecretName=roa/encryption-key",
  "BbClientIdSecretName=roa/bb-client-id",
  "BbClientSecretSecretName=roa/bb-client-secret",
  "SlackWebhookSecretName=roa/slack-webhook-url",
  "BbBaseUrl=https://sandbox.bluebutton.cms.gov",
  "EobQueueName=eob-processing",
  "VpcId=FILL_IN_VPC_ID_DEV",
  "PrivateSubnetIds=FILL_IN_SUBNET_1_DEV,FILL_IN_SUBNET_2_DEV",
  "LambdaSecurityGroupId=FILL_IN_SG_ID_DEV",
]

# ── staging ──────────────────────────────────────────────────────────────────
[staging.global.parameters]
stack_name = "roa-lambdas-staging"
s3_bucket = "FILL_IN_SAM_ARTIFACT_BUCKET_STAGING"
s3_prefix = "roa-lambdas/staging"
region = "us-east-1"
capabilities = "CAPABILITY_IAM CAPABILITY_AUTO_EXPAND CAPABILITY_NAMED_IAM"
confirm_changeset = true
template_file = "infra/template.yaml"

[staging.deploy.parameters]
parameter_overrides = [
  "Environment=staging",
  "DatabaseUrlSecretName=roa/database-url",
  "EncryptionKeySecretName=roa/encryption-key",
  "BbClientIdSecretName=roa/bb-client-id",
  "BbClientSecretSecretName=roa/bb-client-secret",
  "SlackWebhookSecretName=roa/slack-webhook-url",
  "BbBaseUrl=https://sandbox.bluebutton.cms.gov",
  "EobQueueName=eob-processing",
  "VpcId=FILL_IN_VPC_ID_STAGING",
  "PrivateSubnetIds=FILL_IN_SUBNET_1_STAGING,FILL_IN_SUBNET_2_STAGING",
  "LambdaSecurityGroupId=FILL_IN_SG_ID_STAGING",
]

# ── prod ─────────────────────────────────────────────────────────────────────
[prod.global.parameters]
stack_name = "roa-lambdas-prod"
s3_bucket = "FILL_IN_SAM_ARTIFACT_BUCKET_PROD"
s3_prefix = "roa-lambdas/prod"
region = "us-east-1"
capabilities = "CAPABILITY_IAM CAPABILITY_AUTO_EXPAND CAPABILITY_NAMED_IAM"
confirm_changeset = true
template_file = "infra/template.yaml"

[prod.deploy.parameters]
parameter_overrides = [
  "Environment=prod",
  "DatabaseUrlSecretName=roa/database-url",
  "EncryptionKeySecretName=roa/encryption-key",
  "BbClientIdSecretName=roa/bb-client-id",
  "BbClientSecretSecretName=roa/bb-client-secret",
  "SlackWebhookSecretName=roa/slack-webhook-url",
  "BbBaseUrl=https://api.bluebutton.cms.gov",
  "EobQueueName=eob-processing",
  "VpcId=FILL_IN_VPC_ID_PROD",
  "PrivateSubnetIds=FILL_IN_SUBNET_1_PROD,FILL_IN_SUBNET_2_PROD",
  "LambdaSecurityGroupId=FILL_IN_SG_ID_PROD",
]
