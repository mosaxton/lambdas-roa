name: test

# Runs on PRs, pushes to main, and when called by deploy workflows.
on:
  workflow_call:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: roa
          POSTGRES_PASSWORD: roa
          POSTGRES_DB: roa_lambdas_dev
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://roa:roa@localhost:5433/roa_lambdas_dev?sslmode=disable
      # Safe test key — encrypts only synthetic test data, never real PHI
      ENCRYPTION_KEY: "5c3d4a2b1f8e7d6c9b0a1234567890abcdef0123456789abcdef0123456789ab"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip pip-tools
          pip-sync requirements.txt requirements-dev.txt

      - name: Install Node deps (for fixture generation)
        run: npm ci

      - name: Generate cross-language encryption fixture
        run: npx tsx scripts/generate-cross-lang-fixture.ts

      - name: Seed test database
        run: |
          if [[ -f scripts/schema.sql ]]; then
            psql "${DATABASE_URL}" -f scripts/schema.sql
          else
            echo "schema.sql not yet generated — skipping DB seed (integration tests will be skipped)"
          fi

      - name: Lint
        run: make lint

      - name: Unit and integration tests
        run: make test

      - name: Contract drift check (Prisma ↔ Python column names and payer registry)
        run: make check-drift
