name: deploy-staging

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for staging deploy (for audit trail)"
        required: true
        type: string

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  test:
    uses: ./.github/workflows/test.yml

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: staging   # requires reviewer approval if configured in repo settings
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_STAGING }}
          aws-region: us-east-1

      - name: Install AWS SAM CLI
        run: pip install aws-sam-cli

      - name: Install Python deps
        run: |
          pip install --upgrade pip pip-tools
          pip-sync requirements.txt requirements-dev.txt

      - name: SAM build
        run: sam build --config-env staging --cached --parallel

      - name: SAM deploy (staging)
        run: sam deploy --config-env staging

      - name: Output deployed Lambda versions
        run: |
          echo "==> Deployed Lambda versions (staging):"
          aws lambda list-functions \
            --query 'Functions[?starts_with(FunctionName, `roa-`) && ends_with(FunctionName, `-staging`)].{Name:FunctionName,Version:Version}' \
            --output table

      - name: Smoke test
        run: |
          chmod +x scripts/smoke-test.sh
          ./scripts/smoke-test.sh staging
